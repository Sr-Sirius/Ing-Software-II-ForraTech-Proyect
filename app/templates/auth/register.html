{% extends "base.html" %}

{% block body_class %}auth-bg{% endblock %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/pages/register.css') }}">

<div class="login-container">

    <div class="card">

        <!-- LEFT SIDE (GIF / IMAGE) -->
        <div class="hero">
            <div class="bg"></div>
        </div>

        <!-- RIGHT SIDE -->
        <form class="register-form">

            <h2>ForraTech 🌱</h2>
            <h3>Create your account</h3>

            <!-- INPUTS -->
            <input type="text" id="fullname" placeholder="Full name" required>
            <input type="email" id="email" placeholder="Email" required>
            <input type="text" id="username" placeholder="Username" required>


            <div class="password-wrapper">
                <input type="password" id="password" placeholder="Password" required>
    
                <img 
                    src="{{ url_for('static', filename='images/eye-open.svg') }}" 
                    class="toggle-password" 
                    data-target="password"
                    data-state="hidden"
                    data-open="{{ url_for('static', filename='images/eye-open.svg') }}"
                    data-closed="{{ url_for('static', filename='images/eye-closed.svg') }}"
                >
            </div>

            <div class="password-rules" id="password-rules">
                <p id="rule-length">• At least 6 characters</p>
                <p id="rule-uppercase">• One uppercase letter</p>
                <p id="rule-number">• One number</p>
                <p id="rule-special">• One special character</p>
            </div>

            <div class="password-strength">
                <div class="strength-bar"></div>
            </div>

            <div class="form-divider"></div>

            <div class="password-wrapper">
                <input type="password" id="confirm-password" placeholder="Confirm password" required>
                <img 
                    src="{{ url_for('static', filename='images/eye-open.svg') }}" 
                    class="toggle-password" 
                    data-target="confirm-password"
                    data-state="hidden"
                    data-open="{{ url_for('static', filename='images/eye-open.svg') }}"
                    data-closed="{{ url_for('static', filename='images/eye-closed.svg') }}"
                >
            </div>

            <!-- USER TYPE -->
            <select id="user-type" required>
                <option value="">Select user type</option>
                <option>Farmer</option>
                <option>Rancher</option>
                <option>Researcher</option>
            </select>

            <!-- OPTIONAL -->
            <input type="tel" id="phone" placeholder="Phone number (optional)">
            <input type="text" id="location" placeholder="Location (optional)">

            <!-- CHECKBOXES -->
            <div class="checkbox-group">
                <label class="checkbox">
                    <input type="checkbox" id="terms" required>
                    I accept the Terms and Conditions
                </label>

                <label class="checkbox">
                    <input type="checkbox" id="updates">
                    I want to receive updates
                </label>
            </div>

            <!-- BUTTON -->
            <button type="submit">Register</button>

            <!-- LOGIN LINK -->
            <p class="register-link">
                Already have an account?
                <a href="{{ url_for('auth.login') }}">Login</a>
            </p>

        </form>

    </div>

</div>
<script src="{{ url_for('static', filename='js/register.js') }}"></script>
{% endblock %}
